name: Deploy to friend GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: deploy-to-friend-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vite-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vite-project/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to friend repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.FRIEND_PAGES_TOKEN }}
          external_repository: MuthuGanesh-dev/MuthuGanesh-dev.github.io
          publish_branch: main
          publish_dir: ./vite-project/dist
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: update site from source repo (${{ github.sha }})"
